# Dark theme for tmux (Kanagawa Wave) — minimal/clean

set -g status-style "bg=default,fg=colour223"
set -g status-left-length 160
set -g status-right-length 160

# Pane borders
set -g pane-border-style "fg=colour241"
set -g pane-active-border-style "fg=colour110,bold"

# Window status styling
set -g window-status-style "fg=colour244,bg=default"
set -g window-status-current-style "fg=colour234,bg=colour141,bold"
set -g window-status-activity-style none
set -g window-status-separator " "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

set -g status-left "   #[fg=colour223] #(basename \"#{pane_current_path}\")   #[fg=colour174] #(cd \"#{pane_current_path}\" 2>/dev/null && git branch --show-current 2>/dev/null)   "

set -g status-right "   \
#[fg=colour223]#(pmset -g batt | awk 'NR==1 {ac = ($0 ~ /AC Power/)} NR==2 {gsub(/;/,\"\",$3); gsub(/;/,\"\",$4); if(ac) icon=\"\"; else if($4==\"charging\") icon=\"\"; else icon=\"\"; print icon \" \" $3}')   \
#[fg=colour110] %H:%M   \
#[fg=colour107] #S   \
#[fg=colour141]#H   "
