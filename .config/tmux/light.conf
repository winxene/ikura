# Light theme for tmux (Kanagawa Lotus) — minimal/clean

set -g status-style "bg=default,fg=colour95"
set -g status-left-length 160
set -g status-right-length 160

# Pane borders
set -g pane-border-style "fg=colour245"
set -g pane-active-border-style "fg=colour109,bold"

# Window status styling
set -g window-status-style "fg=colour100,bg=default"
set -g window-status-current-style "fg=colour230,bg=colour141,bold"
set -g window-status-activity-style none
set -g window-status-separator " "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

set -g status-left "   #[fg=colour95] #{b:pane_current_path}   "

set -g status-right "   \
#[fg=colour109] %H:%M   \
#[fg=colour107] #S   \
#[fg=colour141]#H   "
